# monitoring/prometheus.yml
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project:     cars-auto

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:4000']
    metrics_path: /api/metrics
    scrape_interval: 15s

  - job_name: 'node-api'
    static_configs:
      - targets: ['api:9464']   # prom-client default port
    scrape_interval: 15s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
