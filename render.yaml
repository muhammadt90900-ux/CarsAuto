services:
  # ── API (NestJS) ──────────────────────────────────────────────────────────
  - type: web
    name: cars-auto-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cars-auto-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cars-auto-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000
    healthCheckPath: /health

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  - type: web
    name: cars-auto-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: apps/web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
      - key: NEXT_OUTPUT
        value: standalone

databases:
  - name: cars-auto-db
    databaseName: carsauto
    user: carsauto_user

  - name: cars-auto-redis
    plan: free
