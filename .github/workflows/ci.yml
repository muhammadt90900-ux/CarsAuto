# .github/workflows/ci.yml
# CI pipeline: lint → test → build Docker images → push to registry → deploy

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY:      ghcr.io
  API_IMAGE:     ghcr.io/${{ github.repository }}/api
  WEB_IMAGE:     ghcr.io/${{ github.repository }}/web
  NODE_VERSION:  '20'

concurrency:
  group:            ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint & Type-check ───────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (API)
        run: npm run lint --workspace=apps/api

      - name: Lint (Web)
        run: npm run lint --workspace=apps/web

      - name: Type-check (API)
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Type-check (Web)
        run: npx tsc --noEmit --project apps/web/tsconfig.json

  # ── Build & Push Docker images ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint
    # Only build on pushes (not PRs from forks)
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      api_digest: ${{ steps.build-api.outputs.digest }}
      web_digest: ${{ steps.build-web.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push API
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context:     apps/api
          file:        apps/api/Dockerfile
          target:      production
          push:        true
          tags:        ${{ steps.meta-api.outputs.tags }}
          labels:      ${{ steps.meta-api.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Web
        id: build-web
        uses: docker/build-push-action@v5
        with:
          context:     apps/web
          file:        apps/web/Dockerfile
          target:      production
          push:        true
          tags:        ${{ steps.meta-web.outputs.tags }}
          labels:      ${{ steps.meta-web.outputs.labels }}
          cache-from:  type=gha
          cache-to:    type=gha,mode=max
          build-args:  |
            NEXT_OUTPUT=standalone

  # ── Security scan ──────────────────────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      security-events: write

    steps:
      - name: Scan API image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    ${{ env.API_IMAGE }}:latest
          format:       sarif
          output:       trivy-results.sarif
          severity:     CRITICAL,HIGH
          exit-code:    '1'   # fail on CRITICAL/HIGH findings

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/cars-auto

            # Pull latest images
            docker pull ${{ env.API_IMAGE }}:latest
            docker pull ${{ env.WEB_IMAGE }}:latest

            # Run DB migrations before rolling containers
            docker run --rm --env-file .env.production \
              ${{ env.API_IMAGE }}:latest \
              npx prisma migrate deploy

            # Rolling restart (zero-downtime)
            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d --no-deps --remove-orphans api web

            # Health check
            sleep 15
            curl -fsS http://localhost:4000/health || (docker compose logs api --tail=50 && exit 1)

            echo "Deployment successful at $(date)"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Deployment failed — ${context.sha.substring(0,7)}`,
              body:  `Production deployment failed. [View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['deployment', 'bug'],
            });
