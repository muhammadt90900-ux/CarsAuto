# .github/workflows/ci.yml
# CarsAuto / CarsAuto — full CI/CD pipeline
#
# Jobs:
#   lint          → ESLint + TypeScript type-check (all workspaces)
#   test          → Unit tests + coverage enforcement (API + Web, parallel)
#   build         → Docker multi-stage build verification (API + Web)
#   security      → Trivy image scan + npm audit + CodeQL SAST
#   e2e           → Playwright critical-workflow smoke tests (main only)
#   deploy        → Kubernetes rollout to production via kustomize (main only,
#                   after all gates) — see apps/k8s/ for manifests. Docker
#                   Compose is local/staging only; it is not deployed by CI.

name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests'
        type: boolean
        default: false

env:
  REGISTRY:        ghcr.io
  API_IMAGE:       ghcr.io/${{ github.repository }}/api
  WEB_IMAGE:       ghcr.io/${{ github.repository }}/web
  WORKER_IMAGE:    ghcr.io/${{ github.repository }}/worker
  NODE_VERSION:    '20'
  # Lightweight CI DB — avoids real credentials in test runs
  DATABASE_URL:    postgresql://carsauto:carsauto@localhost:5432/carsauto_test
  REDIS_URL:       redis://localhost:6379
  # Turborepo Remote Cache — shares build/task artifacts across CI runs & branches.
  # Requires TURBO_TOKEN and TURBO_TEAM to be set as GitHub repo secrets
  # (see vercel.com/account/tokens — the free Vercel remote cache works even
  # without deploying to Vercel).
  TURBO_TOKEN:     ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:      ${{ secrets.TURBO_TEAM }}

concurrency:
  group:             ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Lint & Type-check
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: 🔍 Lint & Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for affected-package detection

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── Warm Turborepo remote cache early so downstream jobs (build/e2e)
      #    can hit cache even on fresh branches. Non-blocking: cache misses
      #    or missing service env vars here must never fail the lint job.
      - name: Warm Turbo remote cache
        run: npx turbo run build --summarize
        continue-on-error: true
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL:    ${{ env.REDIS_URL }}
          JWT_SECRET:   ci-test-secret-do-not-use-in-prod
          NODE_ENV:     production

      # ── Prettier format check (fast, runs before ESLint) ──────────────────
      - name: Format check (Prettier)
        run: npx prettier --check "apps/**/*.{ts,tsx,js}" "packages/**/*.{ts,tsx}"
        continue-on-error: true   # report but don't block; enforce via separate PR check

      # ── ESLint ─────────────────────────────────────────────────────────────
      - name: ESLint — API
        run: npm run lint --workspace=apps/api -- --max-warnings=0
        env:
          NODE_ENV: test

      - name: ESLint — Web
        run: npm run lint --workspace=apps/web -- --max-warnings=0
        env:
          NODE_ENV: test

      # ── TypeScript strict type-check ───────────────────────────────────────
      - name: Type-check — API
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: Type-check — Web
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      # ── Upload lint results as artifact for PR comments ───────────────────
      - name: Annotate lint issues
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.warning('Lint or type-check failed — see step logs above for details.');

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Unit Tests (API + Web in parallel matrices)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    strategy:
      fail-fast: false          # run both even if one fails
      matrix:
        workspace: [api, web]
        include:
          - workspace: api
            test_cmd: npm run test:ci --workspace=apps/api
            coverage_dir: apps/api/coverage
            # API needs Postgres + Redis for integration suites
            needs_services: true
          - workspace: web
            test_cmd: npm run test:ci --workspace=apps/web
            coverage_dir: apps/web/coverage
            needs_services: false

    services:
      postgres:
        image: postgres:16-alpine
        # Only start if the matrix leg needs it
        # GitHub Actions doesn't support conditional services; both legs get it,
        # but only API tests actually connect.
        env:
          POSTGRES_USER:     carsauto
          POSTGRES_PASSWORD: carsauto
          POSTGRES_DB:       carsauto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Run Prisma migrations so integration tests have a schema
      - name: Apply DB schema (API only)
        if: matrix.workspace == 'api'
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        continue-on-error: true   # skip if no prisma dir yet

      # ── Execute tests with coverage ────────────────────────────────────────
      - name: Run tests — ${{ matrix.workspace }}
        run: ${{ matrix.test_cmd }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL:    ${{ env.REDIS_URL }}
          JWT_SECRET:   ci-test-secret-do-not-use-in-prod
          NODE_ENV:     test
          CI:           true

      # ── Verify coverage thresholds passed ─────────────────────────────────
      - name: Verify coverage thresholds — ${{ matrix.workspace }}
        run: |
          SUMMARY="${{ matrix.coverage_dir }}/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "❌ coverage-summary.json not found — tests may not have run"
            exit 1
          fi
          node -e "
            const cov = require('./${{ matrix.coverage_dir }}/coverage-summary.json').total;
            const failed = [];
            if (cov.lines.pct     < 65) failed.push('lines: '     + cov.lines.pct     + '% < 65%');
            if (cov.functions.pct < 65) failed.push('functions: ' + cov.functions.pct + '% < 65%');
            if (cov.branches.pct  < 60) failed.push('branches: '  + cov.branches.pct  + '% < 60%');
            if (failed.length) { console.error('❌ Coverage below threshold:\n' + failed.join('\n')); process.exit(1); }
            console.log('✅ Coverage thresholds passed');
          "
      # ── Upload coverage reports ────────────────────────────────────────────
      - name: Upload coverage — ${{ matrix.workspace }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.workspace }}
          path: ${{ matrix.coverage_dir }}
          retention-days: 7

      # ── Coverage summary comment on PRs ───────────────────────────────────
      - name: Coverage summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const covFile = '${{ matrix.coverage_dir }}/coverage-summary.json';
            if (!fs.existsSync(covFile)) return;
            const cov = JSON.parse(fs.readFileSync(covFile, 'utf8'));
            const t = cov.total;
            const pct = (v) => `${v.pct}%`;
            const body = [
              `### 📊 Coverage — \`${{ matrix.workspace }}\``,
              `| Metric | Coverage |`,
              `|--------|----------|`,
              `| Statements | ${pct(t.statements)} |`,
              `| Branches   | ${pct(t.branches)} |`,
              `| Functions  | ${pct(t.functions)} |`,
              `| Lines      | ${pct(t.lines)} |`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Docker Build Verification
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, test]
    # Build on every push; PRs only build (no push) to verify Dockerfile
    permissions:
      contents: read
      packages: write

    outputs:
      api_digest:    ${{ steps.build-api.outputs.digest }}
      web_digest:    ${{ steps.build-web.outputs.digest }}
      worker_digest: ${{ steps.build-worker.outputs.digest }}
      api_tag:       ${{ steps.meta-api.outputs.version }}
      web_tag:       ${{ steps.meta-web.outputs.version }}
      worker_tag:    ${{ steps.meta-worker.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── API image ──────────────────────────────────────────────────────────
      - name: Extract metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push — API
        id: build-api
        uses: docker/build-push-action@v5
        with:
          context:    apps/api
          file:       apps/api/Dockerfile
          target:     production
          # Push only on push events; PRs only verify the build
          push:       ${{ github.event_name == 'push' }}
          tags:       ${{ steps.meta-api.outputs.tags }}
          labels:     ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          # Embed build provenance for supply-chain attestation
          provenance: true
          sbom:       true

      # ── Web image ──────────────────────────────────────────────────────────
      - name: Extract metadata — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push — Web
        id: build-web
        uses: docker/build-push-action@v5
        with:
          # F-INFRA fix (found while wiring Sentry in PROMPT 3): this was
          # `apps/web`, but apps/web/Dockerfile's own header comment says
          # the build context MUST be the monorepo root — its deps stage
          # does `COPY packages/types/package.json ./packages/types/` etc,
          # paths that don't exist relative to apps/web. Matches the API
          # image's context (`.`) above.
          context:    .
          file:       apps/web/Dockerfile
          target:     production
          push:       ${{ github.event_name == 'push' }}
          tags:       ${{ steps.meta-web.outputs.tags }}
          labels:     ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom:       true
          build-args: |
            NEXT_OUTPUT=standalone
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          # BuildKit secret — never persisted to an image layer, unlike a
          # plain build-arg (see apps/web/Dockerfile's comment on this).
          # Requires a SENTRY_AUTH_TOKEN repo secret; if unset this resolves
          # to an empty string and the Dockerfile's RUN step just skips
          # source map upload (build still succeeds — see next.config.js's
          # withSentryConfig comment).
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      # ── Worker image ───────────────────────────────────────────────────────
      # F-INFRA fix (Prompt 1): apps/worker previously had no CI image build
      # step at all, so worker-deployment.yaml had nothing to pull. Mirrors
      # the API/Web steps above exactly; build context is the monorepo root
      # (context: .) because the worker Dockerfile copies packages/types and
      # packages/config from outside apps/worker — see apps/worker/Dockerfile
      # header comment.
      - name: Extract metadata — Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push — Worker
        id: build-worker
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/worker/Dockerfile
          target:     production
          push:       ${{ github.event_name == 'push' }}
          tags:       ${{ steps.meta-worker.outputs.tags }}
          labels:     ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          provenance: true
          sbom:       true

      # ── Build summary ──────────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Image  | Tag | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API    | \`${{ steps.meta-api.outputs.version }}\` | \`${{ steps.build-api.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web    | \`${{ steps.meta-web.outputs.version }}\` | \`${{ steps.build-web.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | \`${{ steps.meta-worker.outputs.version }}\` | \`${{ steps.build-worker.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Security Scanning
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents:      read
      security-events: write
      packages:      read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      # ── npm audit (dependency CVEs) ────────────────────────────────────────
      - name: npm audit — API
        run: |
          cd apps/api
          npm audit --audit-level=high --json > /tmp/audit-api.json || true
          node -e "
            const r = require('/tmp/audit-api.json');
            const vulns = r.metadata?.vulnerabilities ?? {};
            const high = (vulns.high ?? 0) + (vulns.critical ?? 0);
            if (high > 0) {
              console.error('HIGH/CRITICAL vulnerabilities found in API:', JSON.stringify(vulns));
              process.exit(1);
            }
            console.log('API audit clean:', JSON.stringify(vulns));
          "

      - name: npm audit — Web
        run: |
          cd apps/web
          npm audit --audit-level=high --json > /tmp/audit-web.json || true
          node -e "
            const r = require('/tmp/audit-web.json');
            const vulns = r.metadata?.vulnerabilities ?? {};
            const high = (vulns.high ?? 0) + (vulns.critical ?? 0);
            if (high > 0) {
              console.error('HIGH/CRITICAL vulnerabilities found in Web:', JSON.stringify(vulns));
              process.exit(1);
            }
            console.log('Web audit clean:', JSON.stringify(vulns));
          "

      # ── Trivy — Docker image vulnerability scan ────────────────────────────
      - name: Log in to GHCR (for Trivy pull)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan — API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:  ${{ env.API_IMAGE }}:latest
          format:     sarif
          output:     trivy-api.sarif
          severity:   CRITICAL,HIGH
          exit-code:  '1'
          ignore-unfixed: true    # skip vulns with no upstream fix yet

      - name: Upload Trivy results — API
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file:   trivy-api.sarif
          category:     trivy-api

      - name: Trivy scan — Web image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:  ${{ env.WEB_IMAGE }}:latest
          format:     sarif
          output:     trivy-web.sarif
          severity:   CRITICAL,HIGH
          exit-code:  '1'
          ignore-unfixed: true

      - name: Upload Trivy results — Web
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file:   trivy-web.sarif
          category:     trivy-web

      # ── Trivy filesystem SAST (secrets + misconfigs in source) ─────────────
      - name: Trivy filesystem scan (secrets/misconfig)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:  fs
          scan-ref:   .
          format:     sarif
          output:     trivy-fs.sarif
          exit-code:  '1'
          severity:   CRITICAL,HIGH
          scanners:   secret,misconfig

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category:   trivy-fs

      # ── Scan summary ───────────────────────────────────────────────────────
      - name: Security summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Trivy image scans and npm audit completed." >> $GITHUB_STEP_SUMMARY
          echo "See Security tab → Code scanning alerts for full SARIF results." >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 5 — E2E Tests (Playwright)
# ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    # Only on main pushes unless manually overridden
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_e2e)

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     carsauto
          POSTGRES_PASSWORD: carsauto
          POSTGRES_DB:       carsauto_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run DB migrations for E2E
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://carsauto:carsauto@localhost:5432/carsauto_e2e
        continue-on-error: true

      - name: Build apps for E2E
        run: npx turbo run build --summarize
        env:
          DATABASE_URL:        postgresql://carsauto:carsauto@localhost:5432/carsauto_e2e
          REDIS_URL:           redis://localhost:6379
          JWT_SECRET:          e2e-test-secret
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NODE_ENV:            production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Start API server (background)
        run: |
          node apps/api/dist/main &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait for health endpoint
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && break || sleep 2
          done
        env:
          DATABASE_URL: postgresql://carsauto:carsauto@localhost:5432/carsauto_e2e
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   e2e-test-secret
          PORT:         4000
          NODE_ENV:     production

      - name: Start Web server (background)
        run: |
          node apps/web/.next/standalone/server.js &
          echo "WEB_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ && break || sleep 2
          done
        env:
          PORT:                3000
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NODE_ENV:            production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=github,html
        env:
          E2E_BASE_URL:        http://localhost:3000
          CI:                  true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces (failures only)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: playwright-results/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 6 — Deployment Validation + Production Deploy (Kubernetes)
# ─────────────────────────────────────────────────────────────────────────────
# F-INFRA fix (Prompt 1): the repo previously shipped three competing deploy
# paths (Render.com, this SSH+docker-compose job, and an unused apps/k8s/
# manifest set). Kubernetes is now the single production target — Docker
# Compose remains local/dev + staging only (see docker-compose.yml's header
# comment). This job builds the real image digests from the `build` job into
# apps/k8s/ via kustomize, applies the manifest set, and waits on rollout
# status as the actual health gate (replacing the old "sleep 10 then curl"
# pattern — the readiness/liveness probes already in api-deployment.yaml /
# web-deployment.yaml / worker-deployment.yaml do the real health checking).
#
# Required GitHub repo secrets for this job:
#   KUBE_CONFIG           — base64-encoded kubeconfig for the target cluster
#                           (base64 -w0 ~/.kube/config | pbcopy, then paste
#                           as the secret value)
#   CLOUDFLARE_API_TOKEN  — PROMPT 5: scoped to "Zone.Cache Purge" only for
#                           the carsauto.iq zone — used solely to purge the
#                           CDN cache after a successful web rollout (see
#                           "Purge Cloudflare cache" step below). Does not
#                           need DNS/Zone-settings write access; create it
#                           with the narrowest Cloudflare API Token template
#                           that allows POST /zones/{id}/purge_cache.
#   CLOUDFLARE_ZONE_ID    — the carsauto.iq zone's ID (Cloudflare dashboard
#                           → carsauto.iq → Overview → API section, right
#                           sidebar). Not sensitive on its own, but stored
#                           as a secret anyway to keep zone-identifying
#                           config out of a public repo.
#
# See docs/CDN-SETUP.md for the full Cloudflare setup this job's cache-purge
# step depends on (DNS proxying, cache rules) — this job only purges an
# already-configured CDN's cache, it does not configure the CDN itself.
#
# The purge step is gated behind a `CDN_ENABLED` GitHub Actions repo
# VARIABLE (Settings → Secrets and variables → Actions → Variables — not a
# secret, it's just "true"/unset), defaulting to skipped. carsauto.iq isn't
# registered yet as of this writing (see docs/CDN-SETUP.md's status note),
# so there is no real Cloudflare zone to purge — this avoids every deploy
# failing on missing CLOUDFLARE_* secrets until the domain and CDN are
# actually set up. Set `CDN_ENABLED=true` once docs/CDN-SETUP.md's DNS
# cutover is complete.
  deploy:
    name: 🚀 Deploy to Production (Kubernetes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, security, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Pre-deploy validation ──────────────────────────────────────────────
      - name: Validate image digests
        run: |
          API_DIGEST="${{ needs.build.outputs.api_digest }}"
          WEB_DIGEST="${{ needs.build.outputs.web_digest }}"
          WORKER_DIGEST="${{ needs.build.outputs.worker_digest }}"
          if [[ -z "$API_DIGEST" || -z "$WEB_DIGEST" || -z "$WORKER_DIGEST" ]]; then
            echo "❌ Missing image digest(s) from build job" >&2
            exit 1
          fi
          echo "✅ API digest:    $API_DIGEST"
          echo "✅ Web digest:    $WEB_DIGEST"
          echo "✅ Worker digest: $WORKER_DIGEST"

      # ── Cluster auth ────────────────────────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          # Fail fast if the secret was empty/malformed rather than getting a
          # confusing error deep inside `kubectl apply` below.
          kubectl cluster-info

      # ── Substitute release version for Sentry (PROMPT 3) ────────────────────
      # Lightweight sed on the checked-out (ephemeral) working copy — never
      # touches the actual repo. Not a kustomize `images` transformer target
      # since this isn't an `image:` field; see configmap.yaml's comment on
      # this same placeholder for why sed is used here instead.
      - name: Set release version in configmap
        run: |
          set -euo pipefail
          sed -i "s/{{GIT_SHA}}/${{ github.sha }}/" apps/k8s/configmap.yaml
          grep APP_VERSION apps/k8s/configmap.yaml

      # ── Substitute image digests via kustomize ─────────────────────────────
      # Pin by digest (immutable), not by the mutable :latest / :sha-<short>
      # tags — a digest can never be re-pushed to point at different bytes.
      #
      # IMPORTANT: the left-hand side of each mapping below is the literal
      # `ghcr.io/REPLACE_ORG/REPLACE_REPO/...` placeholder that is still
      # present in api-deployment.yaml/web-deployment.yaml/
      # worker-deployment.yaml (see apps/k8s/README.md) — kustomize matches
      # images by exact name, so this must stay a literal string, NOT
      # ${{ github.repository }}, even though the right-hand side (the real
      # image we're substituting in) correctly uses ${{ github.repository }}.
      # This also means nobody needs to hand-edit REPLACE_ORG/REPLACE_REPO in
      # the deployment manifests themselves — CI does the substitution on
      # every deploy.
      - name: Set image digests in kustomization
        run: |
          set -euo pipefail
          cd apps/k8s
          kustomize edit set image \
            ghcr.io/REPLACE_ORG/REPLACE_REPO/api=ghcr.io/${{ github.repository }}/api@${{ needs.build.outputs.api_digest }} \
            ghcr.io/REPLACE_ORG/REPLACE_REPO/web=ghcr.io/${{ github.repository }}/web@${{ needs.build.outputs.web_digest }} \
            ghcr.io/REPLACE_ORG/REPLACE_REPO/worker=ghcr.io/${{ github.repository }}/worker@${{ needs.build.outputs.worker_digest }}
          echo "── Resulting kustomization.yaml ──"
          cat kustomization.yaml

      - name: Preview rendered manifests
        run: kustomize build apps/k8s/

      # ── Apply ───────────────────────────────────────────────────────────────
      - name: Run database migrations
        run: |
          set -euo pipefail
          echo "▶ Running Prisma migrations via a one-off Pod..."
          # F-INFRA note: `prisma migrate deploy` reads DATABASE_URL (see
          # apps/api/prisma/schema.prisma's datasource block) — but in this
          # namespace DATABASE_URL (from carsauto-secrets, via envFrom below)
          # points at PgBouncer, whose transaction-pooling mode does not
          # reliably support DDL (see apps/k8s/README.md item 7). So this
          # Pod pulls in the normal secretRef/configMapRef like every other
          # workload, then explicitly overrides DATABASE_URL with the value
          # of DATABASE_DIRECT_URL (a straight-to-Postgres connection) for
          # this one migration run only — env entries win over envFrom
          # entries of the same name.
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Pod
          metadata:
            name: carsauto-migrate-${{ github.sha }}
            namespace: carsauto
            labels:
              app: carsauto-migrate
          spec:
            restartPolicy: Never
            containers:
              - name: migrate
                image: ghcr.io/${{ github.repository }}/api@${{ needs.build.outputs.api_digest }}
                command: ["npx", "prisma", "migrate", "deploy"]
                envFrom:
                  - configMapRef:
                      name: carsauto-config
                  - secretRef:
                      name: carsauto-secrets
                env:
                  - name: DATABASE_URL
                    valueFrom:
                      secretKeyRef:
                        name: carsauto-secrets
                        key: DATABASE_DIRECT_URL
          EOF
          kubectl -n carsauto wait --for=jsonpath='{.status.phase}'=Succeeded \
            --timeout=180s "pod/carsauto-migrate-${{ github.sha }}"
          echo "✅ Migrations complete"
          kubectl -n carsauto logs "pod/carsauto-migrate-${{ github.sha }}"
          kubectl -n carsauto delete pod "carsauto-migrate-${{ github.sha }}" --ignore-not-found

      - name: Apply Kubernetes manifests
        run: kubectl apply -k apps/k8s/

      # ── Health gate: real rollout status, not sleep+curl ───────────────────
      - name: Wait for rollout — API
        id: rollout-api
        run: kubectl rollout status deployment/carsauto-api -n carsauto --timeout=300s

      - name: Wait for rollout — Web
        id: rollout-web
        run: kubectl rollout status deployment/carsauto-web -n carsauto --timeout=300s

      - name: Wait for rollout — Worker
        id: rollout-worker
        run: kubectl rollout status deployment/carsauto-worker -n carsauto --timeout=300s

      # ── CDN cache purge (PROMPT 5) ───────────────────────────────────────────
      # Only reached if all three rollouts above succeeded (GitHub Actions
      # skips a step with no `if:` once a prior step in the job fails) — a
      # failed/rolled-back deploy has nothing new worth purging the edge
      # cache for. Purges `/` (the HTML shell, which references hashed
      # /_next/static/ asset URLs baked in at build time) so the CDN can't
      # keep serving a cached HTML page that points at asset hashes from
      # the PREVIOUS deploy after this one's rollout completes — the hashed
      # assets themselves (immutable, 1-year cache — see
      # apps/web/next.config.js's headers()) never need purging; a new
      # deploy produces new hashes and the old ones simply age out.
      # See docs/CDN-SETUP.md's "Deploy-time cache purge" section for why
      # `/` alone is sufficient rather than a full zone purge.
      - name: Purge Cloudflare cache
        if: vars.CDN_ENABLED == 'true'
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://carsauto.iq/"]}')
          echo "$response" | grep -q '"success":true' && echo "✅ Cloudflare cache purged for /" \
            || { echo "❌ Cloudflare cache purge failed: $response" >&2; exit 1; }

      # ── Automatic rollback on any failed rollout ───────────────────────────
      - name: Roll back failed deployment(s)
        if: failure() && (steps.rollout-api.outcome == 'failure' || steps.rollout-web.outcome == 'failure' || steps.rollout-worker.outcome == 'failure')
        run: |
          set +e
          echo "▶ Rolling back failed deployment(s)..."
          if [[ "${{ steps.rollout-api.outcome }}" == "failure" ]]; then
            kubectl rollout undo deployment/carsauto-api -n carsauto
          fi
          if [[ "${{ steps.rollout-web.outcome }}" == "failure" ]]; then
            kubectl rollout undo deployment/carsauto-web -n carsauto
          fi
          if [[ "${{ steps.rollout-worker.outcome }}" == "failure" ]]; then
            kubectl rollout undo deployment/carsauto-worker -n carsauto
          fi
          echo "✅ Rollback issued — verify cluster state manually before re-running CI"

      # ── Deployment summary ─────────────────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status**     | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| **SHA**        | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **API tag**    | \`${{ needs.build.outputs.api_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web tag**    | \`${{ needs.build.outputs.web_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Worker tag** | \`${{ needs.build.outputs.worker_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time**       | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

      # ── Notify on failure ──────────────────────────────────────────────────
      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔴 Deployment failed — ${context.sha.substring(0,7)}`,
              body: [
                '## Production Deployment Failed',
                '',
                `**SHA:** \`${context.sha}\``,
                `**Branch:** \`${context.ref}\``,
                `**Triggered by:** @${context.actor}`,
                '',
                'If a rollout failed, an automatic `kubectl rollout undo` was',
                'attempted — verify cluster state before re-running CI.',
                '',
                `[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              ].join('\n'),
              labels: ['deployment', 'bug', 'P0'],
            });
