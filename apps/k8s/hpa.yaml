# k8s/hpa.yaml
#
# Requires the metrics-server addon running in the cluster (standard on
# most managed Kubernetes offerings; install separately on bare clusters).

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carsauto-api-hpa
  namespace: carsauto
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carsauto-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # Scale up fast (traffic spikes shouldn't wait), scale down slowly
    # (avoid flapping replicas up/down on noisy short-lived dips).
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carsauto-web-hpa
  namespace: carsauto
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carsauto-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
