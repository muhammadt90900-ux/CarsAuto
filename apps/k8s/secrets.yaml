# k8s/secrets.yaml
#
# ⚠️  TEMPLATE ONLY — every value below is a placeholder. Do not apply this
# file as-is, and NEVER commit a version of it with real values filled in.
#
# For real deployments, prefer one of:
#   - Sealed Secrets (bitnami-labs/sealed-secrets) — encrypt before committing
#   - External Secrets Operator — sync from AWS/GCP/Azure/Vault secret managers
#   - SOPS + a CI step that decrypts at deploy time
# Any of those let you keep an encrypted version of this file in git safely.
# Plain `kubectl apply -f secrets.yaml` with real values is only acceptable
# for local/throwaway clusters.
#
# `stringData` (not `data`) is used here deliberately — kubectl base64-encodes
# these for you, so you can paste real values in directly when you DO use this
# as a one-off local template.
apiVersion: v1
kind: Secret
metadata:
  name: carsauto-secrets
  namespace: carsauto
type: Opaque
stringData:
  # ── Database ───────────────────────────────────────────────────────────────────
  # PROMPT 2 (decision already made — see docs/DATABASE-OPERATIONS.md):
  # production points at a managed, Multi-AZ, auto-failover Postgres
  # instance (AWS RDS for Postgres 16, Multi-AZ enabled — or an equivalent
  # managed provider), NOT at self-hosted in-cluster Postgres. Failover
  # (detecting a dead primary, promoting a standby, updating routing) is
  # handled entirely BY THE PROVIDER — nothing in this app's code
  # participates in or needs to know about a failover happening, beyond
  # tolerating a few seconds of connection errors while it completes (see
  # prisma.service.ts's readWithFallback()/health-check logic, and
  # docs/DATABASE-OPERATIONS.md's "What the app experiences during a
  # failover" section).
  #
  # docker-compose.yml's self-hosted primary + 2 streaming replicas
  # (postgres/postgres-replica-1/postgres-replica-2) remain exactly as they
  # are — genuinely useful for local dev (exercises real replication
  # without cloud credentials), genuinely NOT what production uses. The
  # `postgres-replica-1`/`postgres-replica-2` DNS names below in earlier
  # versions of this file were an in-cluster-Postgres holdover that never
  # actually applied in production even before this pass — replaced with
  # explicit RDS-endpoint placeholders below so the mismatch is obvious
  # rather than silently wrong.
  #
  # F-PERF fix: this is the app-facing URL, routed through PgBouncer
  # (see pgbouncer-deployment.yaml) rather than straight at the RDS
  # primary. connection_limit/pool_timeout/pgbouncer=true are appended in
  # code by prisma.service.ts, not here, so they stay in one place.
  DATABASE_URL:        "postgresql://carsauto:CHANGE_ME@carsauto-pgbouncer.carsauto.svc.cluster.local:6432/carsauto"
  # The REAL, direct-to-Postgres URL — in production, your RDS instance's
  # WRITER endpoint (e.g. carsauto-prod.xxxxxxxxxx.us-east-1.rds.amazonaws.com:5432)
  # rather than an in-cluster Service. Used for two things only: (1) as
  # pgbouncer-deployment.yaml's own upstream connection, and (2) for
  # anything that must bypass PgBouncer entirely (schema migrations / `prisma
  # db push`, since transaction-pooling mode does not reliably support DDL).
  # Never point application traffic at this key directly. RDS's writer
  # endpoint stays the same hostname across a failover — DNS just starts
  # resolving it to the newly-promoted instance — so this value does NOT
  # need updating when a failover happens, only when you provision a
  # genuinely different RDS instance (e.g. staging vs production, or a
  # deliberate migration to a new instance).
  DATABASE_DIRECT_URL: "postgresql://carsauto:CHANGE_ME@carsauto-prod.CHANGE_ME.us-east-1.rds.amazonaws.com:5432/carsauto"
  # F-PERF fix (Prompt 7): 2 replicas — see docker-compose.yml's equivalent
  # comment for sizing rationale (no measured read:write ratio yet; this is
  # a documented starting point, not a load-tested number). Comma-separated
  # — see prisma.service.ts's resolveReplicaUrls(). Scale by provisioning
  # another RDS read replica and appending its endpoint here; no code
  # change needed.
  #
  # PROMPT 2: these are RDS READ REPLICA endpoints (each provisioned as its
  # own RDS "read replica" of the Multi-AZ primary above), NOT the
  # in-cluster postgres-replica-1/postgres-replica-2 Services —
  # docker-compose.yml's pg_basebackup-based streaming replicas are the
  # local-dev-only equivalent of this same read-scaling shape, not
  # something production ever points at. RDS read replicas have their own
  # independent failover/recovery lifecycle from the primary (a read
  # replica going down does NOT trigger a primary failover, and vice
  # versa) — see docs/DATABASE-OPERATIONS.md for what the app experiences
  # if a read replica specifically becomes unreachable.
  DATABASE_READ_URLS: "postgresql://carsauto:CHANGE_ME@carsauto-prod-read-1.CHANGE_ME.us-east-1.rds.amazonaws.com:5432/carsauto,postgresql://carsauto:CHANGE_ME@carsauto-prod-read-2.CHANGE_ME.us-east-1.rds.amazonaws.com:5432/carsauto"

  # ── Redis ────────────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://:CHANGE_ME@redis.carsauto.svc.cluster.local:6379"
  # F-SEC fix (Prompt 6): security-critical state (rate limits, OTP, token
  # blocklist, WS presence — see critical-state.service.ts) needs its own
  # keyspace, isolated from the hot cache's allkeys-lru eviction. Two ways
  # to satisfy that — pick based on what your cluster/budget allows:
  #   (a) Leave CRITICAL_REDIS_URL empty (as below) to fall back to
  #       REDIS_URL + a different logical db index (CRITICAL_REDIS_DB) on
  #       the SAME Redis instance/service. Cheapest option; fine as long as
  #       that instance is configured `maxmemory-policy noeviction`
  #       (NOTE: that would then also apply to the hot cache sharing it —
  #       if you go this route, accept that trade-off or run the hot cache's
  #       key volume small enough that eviction is rarely needed anyway).
  #   (b) Set CRITICAL_REDIS_URL to a genuinely separate Redis
  #       instance/service (own noeviction policy, independent of the hot
  #       cache's allkeys-lru) — the safer option, worth the extra managed
  #       Redis cost if your budget allows it.
  CRITICAL_REDIS_URL: ""
  CRITICAL_REDIS_DB:  "1"

  # ── JWT ──────────────────────────────────────────────────────────────────────────
  JWT_SECRET:         "CHANGE_ME_minimum_32_random_bytes"
  JWT_REFRESH_SECRET: "CHANGE_ME_different_32_random_bytes"

  # ── Email ────────────────────────────────────────────────────────────────────────
  GMAIL_USER:          "CHANGE_ME@gmail.com"
  GMAIL_APP_PASSWORD:  "CHANGE_ME"

  # ── Cloudinary (image uploads) ────────────────────────────────────────────────
  CLOUDINARY_CLOUD_NAME: "CHANGE_ME"
  CLOUDINARY_API_KEY:    "CHANGE_ME"
  CLOUDINARY_API_SECRET: "CHANGE_ME"

  # ── OpenAI ───────────────────────────────────────────────────────────────────────
  OPENAI_API_KEY: "CHANGE_ME"

  # ── Meilisearch ──────────────────────────────────────────────────────────────────
  MEILISEARCH_API_KEY: "CHANGE_ME_meilisearch_master_or_scoped_key"

  # ── Payments — Stripe + regional gateways ─────────────────────────────────────
  # Add the rest of the regional gateway credentials (ZainCash, FastPay,
  # QiCard, AsiaHawala, Alipay, WeChat Pay) following the same pattern —
  # see apps/api/.env.example for the full list of keys each one needs.
  STRIPE_SECRET_KEY:     "CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME"

  # ── Web push ─────────────────────────────────────────────────────────────────────
  VAPID_PUBLIC_KEY:  "CHANGE_ME"
  VAPID_PRIVATE_KEY: "CHANGE_ME"
  VAPID_EMAIL:       "noreply@carsauto.iq"

  # ── Misc ─────────────────────────────────────────────────────────────────────────
  EXCHANGE_RATE_API_KEY: "CHANGE_ME"
