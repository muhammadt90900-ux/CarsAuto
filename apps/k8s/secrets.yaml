# k8s/secrets.yaml
#
# ⚠️  TEMPLATE ONLY — every value below is a placeholder. Do not apply this
# file as-is, and NEVER commit a version of it with real values filled in.
#
# For real deployments, prefer one of:
#   - Sealed Secrets (bitnami-labs/sealed-secrets) — encrypt before committing
#   - External Secrets Operator — sync from AWS/GCP/Azure/Vault secret managers
#   - SOPS + a CI step that decrypts at deploy time
# Any of those let you keep an encrypted version of this file in git safely.
# Plain `kubectl apply -f secrets.yaml` with real values is only acceptable
# for local/throwaway clusters.
#
# `stringData` (not `data`) is used here deliberately — kubectl base64-encodes
# these for you, so you can paste real values in directly when you DO use this
# as a one-off local template.
apiVersion: v1
kind: Secret
metadata:
  name: carsauto-secrets
  namespace: carsauto
type: Opaque
stringData:
  # ── Database ───────────────────────────────────────────────────────────────────
  DATABASE_URL:      "postgresql://carsauto:CHANGE_ME@postgres.carsauto.svc.cluster.local:5432/carsauto"
  # Optional — see prisma.service.ts. Leave equal to DATABASE_URL (or omit
  # entirely) if you don't have a read replica yet; reads just hit the primary.
  DATABASE_READ_URL: "postgresql://carsauto:CHANGE_ME@postgres-replica.carsauto.svc.cluster.local:5432/carsauto"

  # ── Redis ────────────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://:CHANGE_ME@redis.carsauto.svc.cluster.local:6379"

  # ── JWT ──────────────────────────────────────────────────────────────────────────
  JWT_SECRET:         "CHANGE_ME_minimum_32_random_bytes"
  JWT_REFRESH_SECRET: "CHANGE_ME_different_32_random_bytes"

  # ── Email ────────────────────────────────────────────────────────────────────────
  GMAIL_USER:          "CHANGE_ME@gmail.com"
  GMAIL_APP_PASSWORD:  "CHANGE_ME"

  # ── Cloudinary (image uploads) ────────────────────────────────────────────────
  CLOUDINARY_CLOUD_NAME: "CHANGE_ME"
  CLOUDINARY_API_KEY:    "CHANGE_ME"
  CLOUDINARY_API_SECRET: "CHANGE_ME"

  # ── OpenAI ───────────────────────────────────────────────────────────────────────
  OPENAI_API_KEY: "CHANGE_ME"

  # ── Meilisearch ──────────────────────────────────────────────────────────────────
  MEILISEARCH_API_KEY: "CHANGE_ME_meilisearch_master_or_scoped_key"

  # ── Payments — Stripe + regional gateways ─────────────────────────────────────
  # Add the rest of the regional gateway credentials (ZainCash, FastPay,
  # QiCard, AsiaHawala, Alipay, WeChat Pay) following the same pattern —
  # see apps/api/.env.example for the full list of keys each one needs.
  STRIPE_SECRET_KEY:     "CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "CHANGE_ME"

  # ── Web push ─────────────────────────────────────────────────────────────────────
  VAPID_PUBLIC_KEY:  "CHANGE_ME"
  VAPID_PRIVATE_KEY: "CHANGE_ME"
  VAPID_EMAIL:       "noreply@carsauto.iq"

  # ── Misc ─────────────────────────────────────────────────────────────────────────
  EXCHANGE_RATE_API_KEY: "CHANGE_ME"
