# k8s/web-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carsauto-web
  namespace: carsauto
  labels:
    app: carsauto-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carsauto-web
  template:
    metadata:
      labels:
        app: carsauto-web
    spec:
      containers:
        - name: web
          image: ghcr.io/REPLACE_ORG/REPLACE_REPO/web:{{IMAGE_TAG}}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: carsauto-config
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 384Mi
          # Next.js doesn't have a dedicated health endpoint — "/" is
          # exactly what apps/web/Dockerfile's own HEALTHCHECK already
          # checks, so this matches the deployment's existing assumption.
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: carsauto-web
