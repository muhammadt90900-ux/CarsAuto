# docker-compose.yml — PRODUCTION HARDENED
# Changes from original:
#   + Redis password authentication
#   + Resource limits (memory/CPU) on all services
#   + Prometheus + Grafana for metrics & dashboards
#   + pg_dump backup service (daily, retained 7 days)
#   + api/web pass all required env vars (not just a subset)
#   + Explicit network isolation (internal vs public)
#   + Log driver: json-file with rotation caps

version: '3.8'

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:        # DB, Redis, API — not exposed to public
    driver: bridge
    internal: true
  public:          # API → web, monitoring — reachable from host
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  postgres_replica_1_data:
  postgres_replica_2_data:
  redis_data:
  redis_critical_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:
  backup_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cars_auto_db
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-carsauto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # no default — must be set
      POSTGRES_DB:       ${POSTGRES_DB:-carsauto}
      PGDATA:            /var/lib/postgresql/data/pgdata
      # F-PERF fix (Prompt 7): consumed by
      # scripts/postgres-init/01-replication-setup.sh (runs once, on this
      # container's first boot only) to create the replicator role.
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # F-PERF fix (Prompt 7): sets up the `replicator` role + pg_hba.conf
      # entry the 2 read replicas below need. Runs once via the official
      # image's docker-entrypoint-initdb.d mechanism (empty-PGDATA-only).
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    # F-PERF fix (Prompt 7): wal_level=replica (+ senders/slots/hot_standby)
    # is what makes streaming replication possible at all — without these,
    # postgres-replica-1/2 below cannot connect. This does NOT change any
    # existing primary/write behavior; it only enables a WAL sender process
    # (idle, near-zero cost) that the replicas connect to.
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsauto} -d ${POSTGRES_DB:-carsauto}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ── PostgreSQL read replicas ───────────────────────────────────────────────────
  # F-PERF fix (Prompt 7): 2 replicas — GJ didn't have a measured read:write
  # ratio to size against, so this is a starting point (see hpa.yaml's
  # sizing-math comment for the same "no data yet, documented estimate"
  # caveat), not a load-tested number. Scale by adding more
  # postgres-replica-N services + appending to DATABASE_READ_URLS below —
  # prisma.service.ts's resolveReplicaUrls() needs no code change for that.
  #
  # Real streaming (physical) replication via pg_basebackup, not a second
  # independent database — see scripts/postgres-replica/replica-entrypoint.sh
  # for exactly what runs on first boot. Verified end-to-end (data written
  # to the primary appears on a replica within ~2s; replicas correctly
  # reject writes) against real Postgres 16 while writing this, though not
  # inside this exact multi-container docker-compose shape — validate that
  # shape specifically before relying on it (see that script's own note).
  postgres-replica-1:
    image: postgres:16-alpine
    container_name: cars_auto_db_replica_1
    restart: unless-stopped
    networks: [internal]
    environment:
      PGDATA:               /var/lib/postgresql/data/pgdata
      PRIMARY_HOST:         postgres
      PRIMARY_PORT:         "5432"
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
      - ./scripts/postgres-replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/replica-entrypoint.sh"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsauto} -d ${POSTGRES_DB:-carsauto}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 60s   # pg_basebackup on first boot takes longer than a normal start
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  postgres-replica-2:
    image: postgres:16-alpine
    container_name: cars_auto_db_replica_2
    restart: unless-stopped
    networks: [internal]
    environment:
      PGDATA:               /var/lib/postgresql/data/pgdata
      PRIMARY_HOST:         postgres
      PRIMARY_PORT:         "5432"
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - postgres_replica_2_data:/var/lib/postgresql/data
      - ./scripts/postgres-replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/replica-entrypoint.sh"]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsauto} -d ${POSTGRES_DB:-carsauto}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 60s
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cars_auto_redis
    restart: unless-stopped
    networks: [internal]
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    # Persistence + password auth
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Redis (critical state) ────────────────────────────────────────────────────
  # F-SEC fix (Prompt 6): separate instance from the hot-cache `redis` above.
  # Holds rate-limit counters, OTP counters, the access-token blocklist,
  # upload rate limits, and WebSocket presence/rate-limit keys — see
  # apps/api/src/common/cache/critical-state.service.ts's header comment for
  # why these must never be evicted the way hot-cache keys can be.
  # `maxmemory-policy noeviction` means Redis returns OOM errors instead of
  # silently dropping keys once memory fills — CriticalStateService's
  # try/catch (inherited from BaseRedisStore) logs and fails per each
  # caller's existing fail-open/fail-closed choice rather than crashing.
  # This data is genuinely small-volume (counters + short sets, not cached
  # DB rows), so 128mb is generous headroom, not a tight budget.
  redis-critical:
    image: redis:7-alpine
    container_name: cars_auto_redis_critical
    restart: unless-stopped
    networks: [internal]
    volumes:
      - redis_critical_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_CRITICAL_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_CRITICAL_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy noeviction
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 32m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── PgBouncer (transaction-mode connection pooler) ────────────────────────────
  # F-PERF fix: sits between api/worker and Postgres. Without this, every pod
  # opens up to Prisma's default (num_cpus*2+1) raw connections PER
  # PrismaClient, and PrismaService creates TWO PrismaClients per pod
  # (write + read) — see apps/api/src/common/prisma/prisma.service.ts. At
  # current HPA limits (10 API pods) that risks exhausting Postgres
  # max_connections; PgBouncer in transaction-pooling mode caps the REAL
  # connections to Postgres to DEFAULT_POOL_SIZE regardless of how many
  # client (app-layer) connections it's multiplexing.
  #
  # `pgbouncer=true` is added to the app's DATABASE_URL (in prisma.service.ts,
  # not here) because transaction pooling does not support named prepared
  # statements — Prisma needs to know to disable those when talking to
  # PgBouncer specifically.
  pgbouncer:
    image: edoburu/pgbouncer:v1.21.0-p2
    container_name: cars_auto_pgbouncer
    restart: unless-stopped
    networks: [internal]
    environment:
      # Upstream (real) Postgres connection — PgBouncer connects here, the
      # app never does, once pointed at pgbouncer:6432 below.
      DATABASE_URL:      postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carsauto}
      LISTEN_PORT:       "6432"
      POOL_MODE:         transaction
      AUTH_TYPE:         scram-sha-256
      SERVER_RESET_QUERY: "DISCARD ALL"
      # Client-facing (app → pgbouncer) connection ceiling. Must be >=
      # (api pods + worker pods) × 2 clients × PRISMA_CONNECTION_LIMIT — see
      # the connection-math comment in prisma.service.ts for the full sum.
      MAX_CLIENT_CONN:   "200"
      # Real connections PgBouncer itself opens to Postgres. This — not
      # MAX_CLIENT_CONN — is what actually counts against Postgres
      # max_connections (default 100).
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE:     "5"
      RESERVE_POOL_SIZE: "5"
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-carsauto}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 128m, cpus: '0.25' }
        reservations: { memory: 32m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Meilisearch (keyword search) ──────────────────────────────────────────────
  # F-ARCH fix: replaces the ILIKE table scan for keyword search. Optional in
  # the sense that the API degrades gracefully to ILIKE if this is down or
  # MEILISEARCH_URL is unset — but it should be running in any real deployment.
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: cars_auto_meilisearch
    restart: unless-stopped
    networks: [internal]
    ports:
      # F-ARCH fix: exposed on localhost only by default — Meilisearch's
      # master key grants full read/write/admin access, so this should
      # never be reachable from outside the host without a reverse proxy
      # and a properly scoped (non-master) API key in front of it.
      - "127.0.0.1:7700:7700"
    environment:
      MEILI_MASTER_KEY:   ${MEILISEARCH_API_KEY}
      MEILI_ENV:          ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test:     ["CMD", "wget", "--quiet", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout:  5s
      retries:  5
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
      target:     production
    container_name: cars_auto_api
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV:                 production
      PORT:                     4000
      # F-PERF fix: routed through PgBouncer (pgbouncer:6432), not straight to
      # Postgres (postgres:5432) — see the pgbouncer service above and the
      # connection-math comment in prisma.service.ts. connection_limit,
      # pool_timeout, and pgbouncer=true are appended by prisma.service.ts
      # itself, not here, so they stay in one place.
      DATABASE_URL:             postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-carsauto}
      # F-PERF fix (Prompt 7): db('read') load-balances across both —
      # comma-separated, see prisma.service.ts's resolveReplicaUrls(). Not
      # routed through PgBouncer (each replica is its own Postgres instance;
      # see the connection-math note in prisma.service.ts for why that's a
      # separate follow-up, not part of this fix).
      DATABASE_READ_URLS:       "postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres-replica-1:5432/${POSTGRES_DB:-carsauto},postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres-replica-2:5432/${POSTGRES_DB:-carsauto}"
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      # F-SEC fix (Prompt 6): separate connection for rate limits/OTP/token
      # blocklist/presence — see critical-state.service.ts's header comment.
      CRITICAL_REDIS_URL:       redis://:${REDIS_CRITICAL_PASSWORD}@redis-critical:6379
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:   ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:             ${FRONTEND_URL}
      # Email
      SMTP_HOST:                ${SMTP_HOST:-}
      SMTP_PORT:                ${SMTP_PORT:-587}
      SMTP_USER:                ${SMTP_USER:-}
      SMTP_PASS:                ${SMTP_PASS:-}
      SMTP_SECURE:              ${SMTP_SECURE:-false}
      MAIL_FROM:                ${MAIL_FROM:-}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME:    ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:       ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:    ${CLOUDINARY_API_SECRET:-}
      # Payments / AI
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-}
      # Search
      MEILISEARCH_URL:          http://meilisearch:7700
      MEILISEARCH_API_KEY:      ${MEILISEARCH_API_KEY:-}
      # Search Architecture Phase 2: instant rollback to Postgres ILIKE —
      # set to "postgres" (no rebuild needed) if Meilisearch relevance or
      # availability ever regresses.
      SEARCH_ENGINE_MODE:       ${SEARCH_ENGINE_MODE:-meilisearch}
      # Push
      VAPID_PUBLIC_KEY:         ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY:        ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL:              ${VAPID_EMAIL:-}
      # Observability
      LOG_LEVEL:                ${LOG_LEVEL:-log}
      SLOW_QUERY_THRESHOLD_MS:  ${SLOW_QUERY_THRESHOLD_MS:-500}
    depends_on:
      pgbouncer:       { condition: service_healthy }
      redis:           { condition: service_healthy }
      redis-critical:  { condition: service_healthy }
      meilisearch:     { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Worker (BullMQ — translations + notifications) ───────────────────────────
  # F-HIGH fix: standalone process so AI translation / email / push jobs never
  # compete with the API's HTTP request handling for CPU. Same DB + Redis as
  # `api`; no exposed port — this service opens no HTTP server.
  worker:
    build:
      context:    .
      dockerfile: apps/worker/Dockerfile
      target:     production
    container_name: cars_auto_worker
    restart: unless-stopped
    networks: [internal]
    environment:
      NODE_ENV:                 production
      # F-PERF fix: same rationale as the api service above — through
      # PgBouncer, not straight to Postgres.
      DATABASE_URL:             postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-carsauto}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      # Translation jobs
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      OPENAI_ENABLED:           ${OPENAI_ENABLED:-true}
      # Search Architecture Phase 1 — search-index.processor.ts writes into
      # the same Meilisearch instance the api service reads from.
      MEILISEARCH_URL:          http://meilisearch:7700
      MEILISEARCH_API_KEY:      ${MEILISEARCH_API_KEY:-}
      # Notification jobs — email
      SMTP_HOST:                ${SMTP_HOST:-}
      SMTP_PORT:                ${SMTP_PORT:-587}
      SMTP_USER:                ${SMTP_USER:-}
      SMTP_PASS:                ${SMTP_PASS:-}
      SMTP_SECURE:              ${SMTP_SECURE:-false}
      GMAIL_USER:               ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD:       ${GMAIL_APP_PASSWORD:-}
      MAIL_FROM:                ${MAIL_FROM:-}
      # Notification jobs — push
      VAPID_PUBLIC_KEY:         ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY:        ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL:              ${VAPID_EMAIL:-}
      # Observability
      LOG_LEVEL:                ${LOG_LEVEL:-log}
      SLOW_QUERY_THRESHOLD_MS:  ${SLOW_QUERY_THRESHOLD_MS:-500}
    depends_on:
      pgbouncer:    { condition: service_healthy }
      redis:        { condition: service_healthy }
      meilisearch:  { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  web:
    build:
      context:    .
      dockerfile: apps/web/Dockerfile
      target:     production
    container_name: cars_auto_web
    restart: unless-stopped
    networks: [public]
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                production
      NEXT_PUBLIC_API_URL:     ${NEXT_PUBLIC_API_URL:-http://api:4000/api}
      # F-PERF fix: server-only — used by apps/web/src/lib/server-api.ts for
      # RSC data fetching, so server-to-server calls hit the API container
      # directly instead of round-tripping through NEXT_PUBLIC_API_URL.
      # Same value as the default above in this single-host compose setup,
      # but kept as its own var since in k8s/production they point at
      # genuinely different addresses (internal service DNS vs public domain).
      INTERNAL_API_URL:        ${INTERNAL_API_URL:-http://api:4000/api}
      NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-}
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_OUTPUT:             standalone
    depends_on:
      - api
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cars_auto_prometheus
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cars_auto_grafana
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         ${GRAFANA_URL:-http://localhost:3001}
    depends_on: [prometheus]
    deploy:
      resources:
        limits: { memory: 256m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Database Backup ───────────────────────────────────────────────────────
  # Nightly at 02:00 UTC: pg_dump (custom + sql.gz) + SHA-256 checksum
  # + gzip integrity check + SQL content validation + Slack alert
  # Retains BACKUP_RETENTION_DAYS (default: 30) days locally.
  # For offsite S3 upload and image backups use: scripts/backup.sh
  backup:
    image: postgres:16-alpine
    container_name: cars_auto_backup
    restart: unless-stopped
    networks: [internal]
    volumes:
      - backup_data:/backups
    environment:
      PGPASSWORD:         ${POSTGRES_PASSWORD}
      POSTGRES_USER:      ${POSTGRES_USER:-carsauto}
      POSTGRES_DB:        ${POSTGRES_DB:-carsauto}
      POSTGRES_HOST:      postgres
      RETENTION_DAYS:     ${BACKUP_RETENTION_DAYS:-30}
      SLACK_WEBHOOK_URL:  ${SLACK_WEBHOOK_URL:-}
    command: >
      sh -c "
        apk add --no-cache curl > /dev/null 2>&1

        notify() {
          MSG=\"$$1\"
          [ -n \"$$SLACK_WEBHOOK_URL\" ] && \
            curl -s -X POST \"$$SLACK_WEBHOOK_URL\" \
              -H 'Content-type: application/json' \
              --data \"{\\\"text\\\":\\\"[CarsAuto Backup] $$MSG\\\"}\" > /dev/null 2>&1 || true
        }

        while true; do
          NOW=$$(date +%s)
          NEXT=$$(( ( NOW / 86400 + 1 ) * 86400 + 7200 ))
          SLEEP=$$(( NEXT - NOW ))
          echo \"[backup] next run in $${SLEEP}s ($$(date -u -d @$$NEXT 2>/dev/null || date -u -r $$NEXT))\"
          sleep $$SLEEP

          TIMESTAMP=$$(date +%Y-%m-%dT%H-%M-%S)
          DIR=/backups/db
          mkdir -p $$DIR

          DUMP_FILE=\"$$DIR/$${POSTGRES_DB}_$${TIMESTAMP}.dump\"
          SQL_FILE=\"$$DIR/$${POSTGRES_DB}_$${TIMESTAMP}.sql.gz\"

          echo \"[backup] starting at $$(date -u)\"

          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER \
                  --no-password --format=custom --compress=9 \
                  $$POSTGRES_DB > $$DUMP_FILE 2>/tmp/err \
            || { echo \"[backup] custom dump FAILED: $$(cat /tmp/err)\"; notify \"❌ pg_dump FAILED at $$TIMESTAMP\"; continue; }

          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER \
                  --no-password $$POSTGRES_DB 2>/tmp/err \
                  | gzip > $$SQL_FILE \
            || { echo \"[backup] sql.gz dump FAILED: $$(cat /tmp/err)\"; notify \"❌ pg_dump (sql) FAILED at $$TIMESTAMP\"; continue; }

          sha256sum $$DUMP_FILE > $${DUMP_FILE}.sha256
          sha256sum $$SQL_FILE  > $${SQL_FILE}.sha256

          gzip -t $$SQL_FILE 2>/dev/null \
            && echo \"[backup] gzip integrity OK\" \
            || { echo \"[backup] gzip integrity FAILED\"; notify \"⚠ gzip integrity FAILED at $$TIMESTAMP\"; }

          LINE_COUNT=$$(zcat $$SQL_FILE 2>/dev/null | wc -l || echo 0)
          if [ \"$$LINE_COUNT\" -lt 10 ]; then
            echo \"[backup] ⚠ dump appears empty ($${LINE_COUNT} lines)\"
            notify \"⚠ Backup appears empty at $$TIMESTAMP\"
          else
            echo \"[backup] SQL content OK ($${LINE_COUNT} lines)\"
          fi

          SIZE=$$(du -sh $$SQL_FILE | cut -f1)
          echo \"[backup] ✔ $${SQL_FILE} ($$SIZE)\"
          notify \"✅ Backup OK at $$TIMESTAMP — $$SIZE\"

          find /backups -type f -mtime +$$RETENTION_DAYS -delete
          echo \"[backup] cleanup done (kept $${RETENTION_DAYS} days)\"
        done
      "
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── Blackbox Exporter (HTTP endpoint probing) ──────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: cars_auto_blackbox
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '9115:9115'
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── PostgreSQL Exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cars_auto_pg_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carsauto}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: cars_auto_redis_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      REDIS_ADDR:     redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [redis]
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }
      