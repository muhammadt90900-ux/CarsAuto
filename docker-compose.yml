# docker-compose.yml — PRODUCTION HARDENED
# Changes from original:
#   + Redis password authentication
#   + Resource limits (memory/CPU) on all services
#   + Prometheus + Grafana for metrics & dashboards
#   + pg_dump backup service (daily, retained 7 days)
#   + api/web pass all required env vars (not just a subset)
#   + Explicit network isolation (internal vs public)
#   + Log driver: json-file with rotation caps

version: '3.8'

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:        # DB, Redis, API — not exposed to public
    driver: bridge
    internal: true
  public:          # API → web, monitoring — reachable from host
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  backup_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cars_auto_db
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-carsauto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # no default — must be set
      POSTGRES_DB:       ${POSTGRES_DB:-autobazaar}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsauto} -d ${POSTGRES_DB:-autobazaar}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cars_auto_redis
    restart: unless-stopped
    networks: [internal]
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    # Persistence + password auth
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context:    ./apps/api
      dockerfile: Dockerfile
      target:     production
    container_name: cars_auto_api
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV:                 production
      PORT:                     4000
      DATABASE_URL:             postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autobazaar}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:   ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:             ${FRONTEND_URL}
      # Email
      SMTP_HOST:                ${SMTP_HOST:-}
      SMTP_PORT:                ${SMTP_PORT:-587}
      SMTP_USER:                ${SMTP_USER:-}
      SMTP_PASS:                ${SMTP_PASS:-}
      SMTP_SECURE:              ${SMTP_SECURE:-false}
      MAIL_FROM:                ${MAIL_FROM:-}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME:    ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:       ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:    ${CLOUDINARY_API_SECRET:-}
      # Payments / AI
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-}
      # Push
      VAPID_PUBLIC_KEY:         ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY:        ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL:              ${VAPID_EMAIL:-}
      # Observability
      LOG_LEVEL:                ${LOG_LEVEL:-log}
      SLOW_QUERY_THRESHOLD_MS:  ${SLOW_QUERY_THRESHOLD_MS:-500}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  web:
    build:
      context:    ./apps/web
      dockerfile: Dockerfile
      target:     production
    container_name: cars_auto_web
    restart: unless-stopped
    networks: [public]
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                production
      NEXT_PUBLIC_API_URL:     ${NEXT_PUBLIC_API_URL:-http://api:4000/api}
      NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-}
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_OUTPUT:             standalone
    depends_on:
      - api
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cars_auto_prometheus
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cars_auto_grafana
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         ${GRAFANA_URL:-http://localhost:3001}
    depends_on: [prometheus]
    deploy:
      resources:
        limits: { memory: 256m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Database Backup ───────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: cars_auto_backup
    restart: unless-stopped
    networks: [internal]
    volumes:
      - backup_data:/backups
    environment:
      PGPASSWORD:    ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-carsauto}
      POSTGRES_DB:   ${POSTGRES_DB:-autobazaar}
      POSTGRES_HOST: postgres
    # Daily backup at 02:00 UTC; keep 7 days
    command: >
      sh -c "
        while true; do
          sleep_seconds=$$(( 86400 - ($$(date +%s) % 86400) + 7200 ))
          echo \"[backup] next run in $${sleep_seconds}s\"
          sleep $$sleep_seconds
          FILE=/backups/$$(date +%Y-%m-%dT%H-%M-%S).sql.gz
          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$FILE \
            && echo \"[backup] wrote $$FILE\" \
            || echo \"[backup] FAILED\"
          find /backups -name '*.sql.gz' -mtime +7 -delete
        done
      "
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 128m, cpus: '0.25' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Blackbox Exporter (HTTP endpoint probing) ──────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: cars_auto_blackbox
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '9115:9115'
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── PostgreSQL Exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cars_auto_pg_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-autobazaar}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: cars_auto_redis_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      REDIS_ADDR:     redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [redis]
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }
