# docker-compose.yml — PRODUCTION HARDENED
# Changes from original:
#   + Redis password authentication
#   + Resource limits (memory/CPU) on all services
#   + Prometheus + Grafana for metrics & dashboards
#   + pg_dump backup service (daily, retained 7 days)
#   + api/web pass all required env vars (not just a subset)
#   + Explicit network isolation (internal vs public)
#   + Log driver: json-file with rotation caps

version: '3.8'

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:        # DB, Redis, API — not exposed to public
    driver: bridge
    internal: true
  public:          # API → web, monitoring — reachable from host
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  backup_data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cars_auto_db
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-carsauto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}     # no default — must be set
      POSTGRES_DB:       ${POSTGRES_DB:-carsauto}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsauto} -d ${POSTGRES_DB:-carsauto}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cars_auto_redis
    restart: unless-stopped
    networks: [internal]
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    # Persistence + password auth
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
      target:     production
    container_name: cars_auto_api
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PORT:-4000}:4000'
    environment:
      NODE_ENV:                 production
      PORT:                     4000
      DATABASE_URL:             postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carsauto}
      REDIS_URL:                redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:               ${JWT_SECRET}
      JWT_EXPIRES_IN:           ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN:   ${JWT_REFRESH_EXPIRES_IN:-7d}
      FRONTEND_URL:             ${FRONTEND_URL}
      # Email
      SMTP_HOST:                ${SMTP_HOST:-}
      SMTP_PORT:                ${SMTP_PORT:-587}
      SMTP_USER:                ${SMTP_USER:-}
      SMTP_PASS:                ${SMTP_PASS:-}
      SMTP_SECURE:              ${SMTP_SECURE:-false}
      MAIL_FROM:                ${MAIL_FROM:-}
      # Cloudinary
      CLOUDINARY_CLOUD_NAME:    ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:       ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:    ${CLOUDINARY_API_SECRET:-}
      # Payments / AI
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY:        ${STRIPE_SECRET_KEY:-}
      # Push
      VAPID_PUBLIC_KEY:         ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY:        ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL:              ${VAPID_EMAIL:-}
      # Observability
      LOG_LEVEL:                ${LOG_LEVEL:-log}
      SLOW_QUERY_THRESHOLD_MS:  ${SLOW_QUERY_THRESHOLD_MS:-500}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  web:
    build:
      context:    .
      dockerfile: apps/web/Dockerfile
      target:     production
    container_name: cars_auto_web
    restart: unless-stopped
    networks: [public]
    ports:
      - '3000:3000'
    environment:
      NODE_ENV:                production
      NEXT_PUBLIC_API_URL:     ${NEXT_PUBLIC_API_URL:-http://api:4000/api}
      NEXT_PUBLIC_WS_URL:      ${NEXT_PUBLIC_WS_URL:-}
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_OUTPUT:             standalone
    depends_on:
      - api
    deploy:
      resources:
        limits:   { memory: 1g, cpus: '1.0' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options: { max-size: "100m", max-file: "5" }

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cars_auto_prometheus
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits: { memory: 512m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cars_auto_grafana
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     false
      GF_SERVER_ROOT_URL:         ${GRAFANA_URL:-http://localhost:3001}
    depends_on: [prometheus]
    deploy:
      resources:
        limits: { memory: 256m, cpus: '0.5' }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

  # ── Database Backup ───────────────────────────────────────────────────────
  # Nightly at 02:00 UTC: pg_dump (custom + sql.gz) + SHA-256 checksum
  # + gzip integrity check + SQL content validation + Slack alert
  # Retains BACKUP_RETENTION_DAYS (default: 30) days locally.
  # For offsite S3 upload and image backups use: scripts/backup.sh
  backup:
    image: postgres:16-alpine
    container_name: cars_auto_backup
    restart: unless-stopped
    networks: [internal]
    volumes:
      - backup_data:/backups
    environment:
      PGPASSWORD:         ${POSTGRES_PASSWORD}
      POSTGRES_USER:      ${POSTGRES_USER:-carsauto}
      POSTGRES_DB:        ${POSTGRES_DB:-carsauto}
      POSTGRES_HOST:      postgres
      RETENTION_DAYS:     ${BACKUP_RETENTION_DAYS:-30}
      SLACK_WEBHOOK_URL:  ${SLACK_WEBHOOK_URL:-}
    command: >
      sh -c "
        apk add --no-cache curl > /dev/null 2>&1

        notify() {
          MSG=\"$$1\"
          [ -n \"$$SLACK_WEBHOOK_URL\" ] && \
            curl -s -X POST \"$$SLACK_WEBHOOK_URL\" \
              -H 'Content-type: application/json' \
              --data \"{\\\"text\\\":\\\"[CarsAuto Backup] $$MSG\\\"}\" > /dev/null 2>&1 || true
        }

        while true; do
          NOW=$$(date +%s)
          NEXT=$$(( ( NOW / 86400 + 1 ) * 86400 + 7200 ))
          SLEEP=$$(( NEXT - NOW ))
          echo \"[backup] next run in $${SLEEP}s ($$(date -u -d @$$NEXT 2>/dev/null || date -u -r $$NEXT))\"
          sleep $$SLEEP

          TIMESTAMP=$$(date +%Y-%m-%dT%H-%M-%S)
          DIR=/backups/db
          mkdir -p $$DIR

          DUMP_FILE=\"$$DIR/$${POSTGRES_DB}_$${TIMESTAMP}.dump\"
          SQL_FILE=\"$$DIR/$${POSTGRES_DB}_$${TIMESTAMP}.sql.gz\"

          echo \"[backup] starting at $$(date -u)\"

          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER \
                  --no-password --format=custom --compress=9 \
                  $$POSTGRES_DB > $$DUMP_FILE 2>/tmp/err \
            || { echo \"[backup] custom dump FAILED: $$(cat /tmp/err)\"; notify \"❌ pg_dump FAILED at $$TIMESTAMP\"; continue; }

          pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER \
                  --no-password $$POSTGRES_DB 2>/tmp/err \
                  | gzip > $$SQL_FILE \
            || { echo \"[backup] sql.gz dump FAILED: $$(cat /tmp/err)\"; notify \"❌ pg_dump (sql) FAILED at $$TIMESTAMP\"; continue; }

          sha256sum $$DUMP_FILE > $${DUMP_FILE}.sha256
          sha256sum $$SQL_FILE  > $${SQL_FILE}.sha256

          gzip -t $$SQL_FILE 2>/dev/null \
            && echo \"[backup] gzip integrity OK\" \
            || { echo \"[backup] gzip integrity FAILED\"; notify \"⚠ gzip integrity FAILED at $$TIMESTAMP\"; }

          LINE_COUNT=$$(zcat $$SQL_FILE 2>/dev/null | wc -l || echo 0)
          if [ \"$$LINE_COUNT\" -lt 10 ]; then
            echo \"[backup] ⚠ dump appears empty ($${LINE_COUNT} lines)\"
            notify \"⚠ Backup appears empty at $$TIMESTAMP\"
          else
            echo \"[backup] SQL content OK ($${LINE_COUNT} lines)\"
          fi

          SIZE=$$(du -sh $$SQL_FILE | cut -f1)
          echo \"[backup] ✔ $${SQL_FILE} ($$SIZE)\"
          notify \"✅ Backup OK at $$TIMESTAMP — $$SIZE\"

          find /backups -type f -mtime +$$RETENTION_DAYS -delete
          echo \"[backup] cleanup done (kept $${RETENTION_DAYS} days)\"
        done
      "
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }

  # ── Blackbox Exporter (HTTP endpoint probing) ──────────────────────────────
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: cars_auto_blackbox
    restart: unless-stopped
    networks: [internal, public]
    ports:
      - '9115:9115'
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── PostgreSQL Exporter ────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cars_auto_pg_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-carsauto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-carsauto}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }

  # ── Redis Exporter ────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: cars_auto_redis_exporter
    restart: unless-stopped
    networks: [internal]
    environment:
      REDIS_ADDR:     redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on: [redis]
    deploy:
      resources:
        limits: { memory: 64m, cpus: '0.1' }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "2" }